<!DOCTYPE html>\n<html lang=\"da\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Clovr Refund Manager</title>\n  <link rel=\"stylesheet\" href=\"styles.css\">\n</head>\n<body>\n  <div class=\"container\">\n    <div class=\"header\">\n      <h1>Clovr Refund Manager</h1>\n      <button id=\"settings-btn\" class=\"settings-btn\">⚙️</button>\n    </div>\n\n    <div id=\"auth-section\" class=\"section hidden\">\n      <h2>Login til Clovr</h2>\n      <input type=\"email\" id=\"email\" placeholder=\"Email\" class=\"input\">\n      <input type=\"password\" id=\"password\" placeholder=\"Kodeord\" class=\"input\">\n      <button id=\"login-btn\" class=\"btn btn-primary\">Log ind</button>\n      <p id=\"login-error\" class=\"error hidden\"></p>\n    </div>\n\n    <div id=\"main-section\" class=\"section hidden\">\n      <div class=\"stats\">\n        <div class=\"stat-card\">\n          <span class=\"stat-label\">Forsinkede</span>\n          <span class=\"stat-value\" id=\"delayed-count\">0</span>\n        </div>\n        <div class=\"stat-card\">\n          <span class=\"stat-label\">MBG Eligible</span>\n          <span class=\"stat-value\" id=\"mbg-count\">0</span>\n        </div>\n        <div class=\"stat-card\">\n          <span class=\"stat-label\">Handling påkrævet</span>\n          <span class=\"stat-value\" id=\"action-count\">0</span>\n        </div>\n      </div>\n\n      <div class=\"actions\">\n        <button id=\"refresh-btn\" class=\"btn btn-secondary\">🔄 Opdater data</button>\n        <button id=\"claim-all-btn\" class=\"btn btn-primary\">Kræv alle refunder</button>\n      </div>\n\n      <div id=\"shipments-list\" class=\"shipments-list\">\n        <!-- Populated by JavaScript -->\n      </div>\n\n      <button id=\"logout-btn\" class=\"btn btn-logout\">Log ud</button>\n    </div>\n\n    <div id=\"loading\" class=\"loading hidden\">Indlæser...</div>\n  </div>\n\n  <script src=\"popup.js\"></script>\n</body>\n</html>
